[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @masjid/database run db:generate && cd apps/api && pnpm exec tsc"]

[start]
cmd = "node apps/api/dist/server.js"
